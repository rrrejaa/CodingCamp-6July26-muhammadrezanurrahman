<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Compatibility banner: shown only when localStorage is unavailable -->
  <div id="compatibility-banner" style="display:none;" role="alert">
    <p>Your browser does not support a required feature (<strong>localStorage</strong>). Please use a supported browser:
      Chrome, Firefox, Edge, or Safari.</p>
  </div>

  <!-- Balance Display -->
  <section id="balance-display" aria-label="Total Balance">
    <h2>Total Balance</h2>
    <p id="balance-amount">$0.00</p>
  </section>

  <!-- Input Form -->
  <section id="input-form-section" aria-label="Add Transaction">
    <h2>Add Transaction</h2>
    <form id="transaction-form" novalidate>
      <div class="form-group">
        <label for="item-name">Item Name</label>
        <input type="text" id="item-name" name="name" maxlength="100" placeholder="e.g. Coffee" autocomplete="off">
        <span class="field-error" id="name-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="item-amount">Amount ($)</label>
        <input type="number" id="item-amount" name="amount" min="0.01" max="999999999.99" step="0.01"
          placeholder="e.g. 12.50">
        <span class="field-error" id="amount-error" role="alert" aria-live="polite"></span>
      </div>

      <div class="form-group">
        <label for="item-category">Category</label>
        <select id="item-category" name="category">
          <option value="">-- Select Category --</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>
        <span class="field-error" id="category-error" role="alert" aria-live="polite"></span>
      </div>

      <button type="submit">Add Transaction</button>
    </form>
  </section>

  <!-- Transaction List -->
  <section id="transaction-list-section" aria-label="Transaction List">
    <h2>Transactions</h2>
    <ul id="transaction-list" aria-live="polite" aria-label="List of transactions">
    </ul>
  </section>

  <!-- Chart -->
  <section id="chart-section" aria-label="Spending Chart">
    <h2>Spending by Category</h2>
    <div id="chart-container">
      <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
      <p id="chart-placeholder">No data to display</p>
    </div>
  </section>

  <!-- Error Toast -->
  <div id="error-toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/app.js" defer></script>
</body>

</html>
